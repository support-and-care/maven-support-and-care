[project]
site_name = "Support & Care for Apache Maven"
site_url = "https://support-and-care.openelements.com/"
site_description = "Public workspace tracking the work of the Support & Care for Apache Maven initiative."
site_author = "Support & Care for Apache Maven"
copyright = "Support & Care for Apache Maven"
repo_url = "https://github.com/support-and-care/maven-support-and-care"

# The structure under src/docs is preserved as-is; Zensical reads from here.
docs_dir = "src/docs"

# Output directory for the built static site (served by the Coolify container).
site_dir = "site"

use_directory_urls = true

[project.theme]
variant = "modern"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.tables]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

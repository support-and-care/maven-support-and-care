name: Build and Preview Documentation

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]
  workflow_dispatch:

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation with Zensical
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Zensical
        run: pip install -r requirements.txt

      - name: Build site
        run: zensical build

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site
          if-no-files-found: error

  deploy-preview:
    name: Deploy PR preview to GitHub Pages
    needs: build
    if: |
      github.event_name == 'pull_request'
      && github.event.action != 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: ./site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy

  remove-preview:
    name: Remove PR preview from GitHub Pages
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Remove preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
